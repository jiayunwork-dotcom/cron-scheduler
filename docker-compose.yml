version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cron-postgres
    environment:
      POSTGRES_USER: cron_user
      POSTGRES_PASSWORD: cron_password
      POSTGRES_DB: cron_scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cron_user -d cron_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cron-network

  redis:
    image: redis:7-alpine
    container_name: cron-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cron-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cron-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: cron_user
      DB_PASSWORD: cron_password
      DB_NAME: cron_scheduler
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      MAX_CONCURRENT_JOBS: 5
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cron-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cron-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cron-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  cron-network:
    driver: bridge
